{% extends 'ana_sablon.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="bi bi-pencil-square"></i> Ürün Düzenle
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Kategori</label>
                        <select name="kategori_id" class="form-select" required>
                            {% for k in kategoriler %}
                            <option value="{{ k.KategoriID }}" {% if k.KategoriID == urun.KategoriID %}selected{% endif %}>
                                {{ k.KategoriAdi }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Barkod</label>
                        <input type="text" name="barkod" class="form-control" value="{{ urun.Barkod }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ürün Adı</label>
                        <input type="text" name="ad" class="form-control" value="{{ urun.UrunAdi }}" required>
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">Net Fiyat (₺)</label>
                            <input type="number" step="0.01" name="fiyat" class="form-control" value="{{ urun.Fiyat }}" required>
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">Stok Miktarı</label>
                            <input type="number" name="stok" class="form-control" value="{{ urun.StokMiktari }}" required>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Güncelle</button>
                        <a href="/" class="btn btn-outline-secondary">Vazgeç</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
