{% extends 'ana_sablon.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <i class="bi bi-plus-circle"></i> Yeni Ürün Ekle
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Kategori</label>
                        <select name="kategori_id" class="form-select" required>
                            <option value="">Seçiniz...</option>
                            {% for k in kategoriler %}
                            <option value="{{ k.KategoriID }}">{{ k.KategoriAdi }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Barkod</label>
                        <input type="text" name="barkod" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ürün Adı</label>
                        <input type="text" name="ad" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">Net Fiyat (₺)</label>
                            <input type="number" step="0.01" name="fiyat" class="form-control" required>
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">Stok Miktarı</label>
                            <input type="number" name="stok" class="form-control" required>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Kaydet</button>
                        <a href="/" class="btn btn-outline-secondary">Vazgeç</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
