{% extends 'ana_sablon.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-receipt"></i> Satış Geçmişi</h4>
    <a href="/satis" class="btn btn-warning"><i class="bi bi-cart-plus"></i> Yeni Satış</a>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Satış ID</th>
                    <th>Tarih</th>
                    <th>Toplam Tutar</th>
                </tr>
            </thead>
            <tbody>
                {% for s in satislar %}
                <tr>
                    <td>#{{ s.SatisID }}</td>
                    <td>{{ s.Tarih }}</td>
                    <td><strong class="text-success">{{ s.ToplamTutar }} ₺</strong></td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="text-center text-muted py-4">Henüz satış yapılmamış.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
